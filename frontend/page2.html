<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Event Type</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bogle&family=Fjalla+One&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playwrite+PL:wght@100..400&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet"> 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Comfortaa', sans-serif;
      background: #9796f0;
      background: -webkit-linear-gradient(to right, #fbc7d4, #9796f0);
      background: linear-gradient(to right, #fbc7d4, #9796f0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page-title {
      text-align: center;
      font-size: 42px;
      font-family: "Fjalla One", sans-serif;
      font-weight: 400;
      font-style: normal;
      margin-bottom: 60px;
      color: #2C2C54;
      letter-spacing: -0.5px;
    }

    .cards-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .event-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
      transition: all 0.4s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .event-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .event-card-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .event-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .event-card:hover .event-card-image img {
      transform: scale(1.1);
    }

    .event-card-content {
      padding: 30px;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .event-card-content h3 {
      font-size: 24px;
      font-weight: 600;
      color: #2C2C54;
      margin-bottom: 12px;
      font-family: 'Comfortaa', sans-serif;
    }

    .event-card-content p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .event-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .back-btn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: linear-gradient(135deg, #2C2C54 0%, #40407A 100%);
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 50px;
      font-size: 16px;
      font-family: 'Comfortaa', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(44, 44, 84, 0.3);
      transition: all 0.3s ease;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(44, 44, 84, 0.4);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .page-title {
        font-size: 32px;
        margin-bottom: 40px;
      }

      .cards-container {
        grid-template-columns: 1fr;
        gap: 30px;
        max-width: 400px;
      }

      .event-card-content {
        padding: 25px;
      }

      .event-card-content h3 {
        font-size: 22px;
      }

      .event-card-content p {
        font-size: 14px;
      }

      .back-btn {
        bottom: 20px;
        left: 20px;
        padding: 12px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <h1 class="page-title">Choose Event Type</h1>
  
  <div class="cards-container">
    <!-- Coding Events Card -->
    <div class="event-card" onclick="window.location.href='codingevents.html';">
      <div class="event-card-image">
        <img src="https://image2url.com/images/1761388809801-d43e3be4-be95-4a4d-892c-6a35c38fc771.jpg" alt="Coding Events">
      </div>
      <div class="event-card-content">
        <div class="event-icon">💻</div>
        <h3>Coding Events</h3>
        <p>Explore coding competitions, hackathons, and tech workshops</p>
      </div>
    </div>

    <!-- Non-Coding Events Card -->
    <div class="event-card" onclick="window.location.href='noncoding.html';">
      <div class="event-card-image">
        <img src="https://image2url.com/images/1761389304578-adf578e0-f713-4a04-af56-400e284ca3fe.jpg" alt="Non-Coding Events">
      </div>
      <div class="event-card-content">
        <div class="event-icon">🎭</div>
        <h3>Non-Coding Events</h3>
        <p>Discover cultural events, quizzes, and fun activities</p>
      </div>
    </div>
  </div>

  <!-- Back Button -->
  <button class="back-btn" onclick="goBack()">&#8592; Back</button>
  
  <script>
    function goBack() {
      window.location.href = 'page1.html';
    }
  </script>
</body>
</html>
